[tox]
envlist = py{311}, lint, format
skip_missing_interpreters = true

[testenv]
description = Run tests with pytest
deps = -r{toxinidir}/requirements.txt
commands = pytest tests/ features/ --tb=short -v

[testenv:lint]
description = Run linting checks
skip_install = true
deps =
    black==23.12.1
    ruff==0.1.8
commands =
    ruff check .
    black --check .

[testenv:format]
description = Format code
skip_install = true
deps =
    black==23.12.1
    ruff==0.1.8
commands =
    black .
    ruff check . --fix

[testenv:smoke]
description = Run smoke tests only
deps = -r{toxinidir}/requirements.txt
commands = pytest -m smoke tests/ features/ --tb=short -v

[testenv:regression]
description = Run regression tests only
deps = -r{toxinidir}/requirements.txt
commands = pytest -m regression tests/ features/ --tb=short -v

[testenv:allure]
description = Generate Allure report
skip_install = true
deps = allure-pytest
commands = allure generate reports/allure-results -o allure-report --clean

[pytest]
testpaths = tests features
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --alluredir=reports/allure-results
markers =
    smoke: Smoke test
    regression: Regression test
    ui: UI test
